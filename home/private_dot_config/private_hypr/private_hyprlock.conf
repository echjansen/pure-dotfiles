general {
    grace = 1
}

# Background of lock screen
background {
    monitor =
    path = screenshot           # screenshot of your desktop
    color = $color7
    blur_size = 4
    blur_passes = 2             # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000           # Vibrant
    brightness = 1.000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}


# Password entry field.
input-field {
    monitor =
    size = 250, 50
    position = 0, 200
    halign = center
    valign = bottom
    outline_thickness = 3
    dots_size = 0.33            # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15         # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $color1
    inner_color = $color0
    font_color = $color7
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false

}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B %Y')" </b>"
    color = $color1
    font_size = 34
    font_family = JetBrains Mono Nerd Font 10

    position = 0, -150
    halign = center
    valign = top
}

# Time
label {
    monitor =
    # text = cmd[update:1000] echo "<b><big> $(date +"%I:%M:%S %p") </big></b>" # AM/PM
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>" # 24H
    color = $color7
    font_size = 50
    font_family = JetBrains Mono Nerd Font 10

    position = 0, -250
    halign = center
    valign = top
}

# User
label {
    monitor =
    text =    $USER
    color = $color7
    font_size = 18
    font_family = Inter Display Medium

    position = 0, 100
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p)" </b>"
    color = $color12
    font_size = 14
    font_family = JetBrains Mono Nerd Font 10
    position = 0, 0
    halign = right
    valign = bottom
}
