general {
    lock_cmd = pidof hyprlock || hyprlock         # avoid starting multiple hyprlock instances.
    before_sleep_cmd = hyprlock                   # lock before suspend.
    after_sleep_cmd = notify-send "Awake"         # to avoid having to press a key twice to turn on the display.
}

# Idle for 2.5 minites, lower screen brightness
listener {
    timeout = 10 #150                                 # 2.5min.
    on-timeout = brightnessctl -s set 10          # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                  # monitor backlight restore.
}

# Idle for 5 minutes, lock the screen
listener {
    timeout = 20 #                                 # 5 min
    on-timeout = hyprlock                         # lock screen when timeout has passed
    on-resume = notify-send "Welcome back!"
}

# Idle for 5.5 minutes, turn off the screen
listener {
    timeout = 30 # 330                                 # 5.5min
    on-timeout = hyprctl dispatch dpms off        # screen off when timeout has passed
    on-resume = hyprctl dispatch dpms on          # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 40 # 1800                                # 30min
    on-timeout = systemctl suspend                # suspend pc
    on-resume = notify-send "Welcome back"
}

